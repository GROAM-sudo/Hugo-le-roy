<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>⚠️ Attention</title>
<style>
  html, body {
    margin: 0; padding: 0; background: #000; overflow: hidden;
    height: 100%; width: 100%; font-family: Arial, sans-serif;
  }
  #warning {
    position: fixed; inset: 0; background: #111; color: #fff;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center; z-index: 999; padding: 20px;
  }
  #warning h1 { color: #ff3b3b; }
  #warning button {
    margin-top: 20px; padding: 15px 30px; font-size: 18px; cursor: pointer;
    background: #ff3b3b; border: none; color: #fff; border-radius: 8px;
  }
  #stage { position: fixed; inset: 0; display: block; }
  iframe {
    position: fixed; inset: 0; width: 100%; height: 100%; border: none;
  }
  #flash {
    position: fixed; inset: 0; background: #fff; opacity: 0;
    pointer-events: none; z-index: 500;
  }
  #flash.on { animation: flashAnim 0.15s steps(1); }
  @keyframes flashAnim {
    0% { opacity: 1; }
    100% { opacity: 0; }
  }
  #jumpscare {
    position: fixed; inset: 0; z-index: 600; display: none;
    align-items: center; justify-content: center; background: #000;
  }
  #jumpscare span {
    font-size: 20vw; color: red; text-shadow: 0 0 40px red;
  }
  #soundBtn {
    position: fixed; bottom: 20px; right: 20px; z-index: 700;
    padding: 14px 22px; font-size: 16px; cursor: pointer;
    background: #ff3b3b; border: none; color: #fff; border-radius: 8px;
  }
</style>
</head>
<body>

<div id="stage">
  <iframe id="player" src="https://www.youtube.com/embed/hhz_FKz7BjI?autoplay=1&mute=1&controls=0&loop=1&playlist=hhz_FKz7BjI&enablejsapi=1" allow="autoplay; encrypted-media" allowfullscreen></iframe>
  <div id="flash"></div>
  <div id="jumpscare"><span>👹</span></div>
  <button id="soundBtn" onclick="unmute()">🔊 Activer le son</button>
</div>

<script>
// Le navigateur bloque le son en autoplay tant qu'il n'y a pas eu de clic :
// on tente donc d'activer le son automatiquement au premier clic n'importe où sur la page
document.addEventListener('click', function(){ unmute(); }, {once:true});

(function(){

  // Flashs répétés à intervalle irrégulier (simulateur, pas synchro réelle avec l'audio :
  // impossible à analyser côté client à cause des restrictions cross-origin de YouTube)
  function randomFlash(){
    const flash = document.getElementById('flash');
    flash.classList.remove('on');
    void flash.offsetWidth; // reset animation
    flash.classList.add('on');
    setTimeout(randomFlash, 400 + Math.random()*1200);
  }
  randomFlash();

  // Jump scare occasionnel
  function randomScare(){
    const js = document.getElementById('jumpscare');
    js.style.display = 'flex';
    setTimeout(()=> js.style.display='none', 300);
    setTimeout(randomScare, 4000 + Math.random()*6000);
  }
  setTimeout(randomScare, 3000);
})();

function unmute(){
  const player = document.getElementById('player');
  // Commandes de l'API YouTube iframe envoyées via postMessage
  player.contentWindow.postMessage(JSON.stringify({event:'command', func:'unMute', args:[]}), '*');
  player.contentWindow.postMessage(JSON.stringify({event:'command', func:'setVolume', args:[100]}), '*');
  player.contentWindow.postMessage(JSON.stringify({event:'command', func:'playVideo', args:[]}), '*');
}
</script>

</body>
</html>
